global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []
      scheme: http
      timeout: 10s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  - job_name: node_exporter
    static_configs:
      - targets:
          - node_exporter:9100

  - job_name: etcd
    static_configs:
      - targets:
          - etcd:2379

  - job_name: "jaeger-v2"
    static_configs:
      - targets: ["jaeger:8888"] # Internal telemetry port
    scrape_interval: 15s
    metrics_path: /metrics

  - job_name: mithril-chunk-node
    static_configs:
      - targets:
          - chunk-node:9464
    scrape_interval: 5s
    metrics_path: /metrics
