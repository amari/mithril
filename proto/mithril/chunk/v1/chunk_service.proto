syntax = "proto3";

package mithril.chunk.v1;

import "buf/validate/validate.proto";

option go_package = "github.com/amari/mithril/gen/go/proto/mithril/chunk/v1;chunkv1";

message Chunk {
  bytes id = 1;
  uint64 version = 2;
  int64 size = 3;
}

message Volume {
  enum State {
    STATE_UNSPECIFIED = 0; // Should never be returned
    STATE_OK = 1; // Healthy - all operations allowed
    STATE_DEGRADED = 2; // Impaired - only read/stat allowed
    STATE_FAILED = 3; // Dead - only stat allowed (for debugging)
  }
  State state = 1;
}

message Node {
  uint32 id = 1;
}

message ErrorDetails {
  ErrorCode code = 1;
  // Local/target chunk
  optional Chunk chunk = 2;
  // Local/target volume
  optional Volume volume = 3;
  // Remote/source chunk (for cross-node ops)
  optional Chunk remote_peer_chunk = 4;
  // Remote/source volume (for cross-node ops)
  optional Volume remote_peer_volume = 5;
  // Remote/source node (for cross-node ops)
  optional Node remote_peer_node = 6;
}

enum ErrorCode {
  ERROR_CODE_UNSPECIFIED = 0;
  ERROR_CODE_INTERNAL = 1;
  ERROR_CODE_CANCELED = 21;
  ERROR_CODE_DEADLINE_EXCEEDED = 22;
  ERROR_CODE_CHUNK_NOT_FOUND = 10;
  ERROR_CODE_CHUNK_ALREADY_EXISTS = 11;
  ERROR_CODE_CHUNK_CORRUPTED = 12;
  ERROR_CODE_CHUNK_WRITE_INCOMPLETE = 13;
  ERROR_CODE_CHUNK_INVALID_OPERATION = 14;
  ERROR_CODE_CHUNK_INVALID_ID = 15;
  ERROR_CODE_CHUNK_INVALID_VERSION = 16;
  ERROR_CODE_CHUNK_INVALID_RANGE = 17;
  ERROR_CODE_CLOCK_NOT_MONOTONIC = 18;
  ERROR_CODE_VOLUME_DEGRADED = 19;
  ERROR_CODE_VOLUME_FAILED = 20;
}

service ChunkService {
  rpc CreateChunk(CreateChunkRequest) returns (CreateChunkResponse);

  rpc PutChunk(stream PutChunkRequest) returns (PutChunkResponse);

  rpc AppendChunk(stream AppendChunkRequest) returns (AppendChunkResponse);

  rpc AppendFromChunk(AppendFromChunkRequest) returns (AppendFromChunkResponse);

  rpc DeleteChunk(DeleteChunkRequest) returns (DeleteChunkResponse);

  rpc ShrinkChunk(ShrinkChunkRequest) returns (ShrinkChunkResponse);

  rpc StatChunk(StatChunkRequest) returns (StatChunkResponse);

  rpc ReadChunk(ReadChunkRequest) returns (stream ReadChunkResponse);
}

message CreateChunkRequest {
  bytes writer_key = 1 [(buf.validate.field).required = true];
  int64 min_tail_slack_length = 2;
}

message CreateChunkResponse {
  Chunk chunk = 1;
  Volume volume = 2;
}

message PutChunkRequest {
  oneof request {
    PutChunkRequestHeader header = 1;
    PutChunkRequestData data = 2;
  }
}

message PutChunkRequestHeader {
  bytes writer_key = 1 [(buf.validate.field).required = true];
  int64 min_tail_slack_length = 2;
  int64 total_data_length = 3;
}

message PutChunkRequestData {
  bytes data = 1 [(buf.validate.field).required = true];
}

message PutChunkResponse {
  Chunk chunk = 1;
  Volume volume = 2;
}

message AppendChunkRequest {
  oneof request {
    AppendChunkRequestHeader header = 1;
    AppendChunkRequestData data = 2;
  }
}

message AppendChunkRequestHeader {
  bytes writer_key = 1 [(buf.validate.field).required = true];
  uint64 expected_version = 2 [(buf.validate.field).required = true];
  int64 min_tail_slack_length = 3;
  int64 total_data_length = 4 [(buf.validate.field).required = true];
}

message AppendChunkRequestData {
  bytes data = 1 [(buf.validate.field).required = true];
}

message AppendChunkResponse {
  Chunk chunk = 1;
  Volume volume = 2;
}

message AppendFromChunkRequest {
  bytes writer_key = 1 [(buf.validate.field).required = true];
  uint64 expected_version = 2 [(buf.validate.field).required = true];
  int64 min_tail_slack_length = 3;

  bytes remote_chunk_id = 11 [(buf.validate.field).required = true];
  int64 remote_chunk_offset = 12 [(buf.validate.field).required = true];
  int64 remote_chunk_length = 13 [(buf.validate.field).required = true];
}

message AppendFromChunkResponse {
  Chunk chunk = 1;
  Volume volume = 2;
}

message DeleteChunkRequest {
  bytes writer_key = 1 [(buf.validate.field).required = true];
}

message DeleteChunkResponse {
  Chunk chunk = 1;
  Volume volume = 2;
}

message ShrinkChunkRequest {
  bytes writer_key = 1 [(buf.validate.field).required = true];
  uint64 expected_version = 2 [(buf.validate.field).required = true];
  int64 max_tail_slack_length = 3;
}

message ShrinkChunkResponse {
  Chunk chunk = 1;
  Volume volume = 2;
}

message StatChunkRequest {
  bytes chunk_id = 1 [(buf.validate.field).required = true];
}

message StatChunkResponse {
  Chunk chunk = 1;
  Volume volume = 2;
}

message ReadChunkRequest {
  bytes chunk_id = 1 [(buf.validate.field).required = true];
  int64 offset = 2 [(buf.validate.field).required = true];
  int64 length = 3 [(buf.validate.field).required = true];
}

message ReadChunkResponse {
  oneof response {
    ReadChunkResponseHeader header = 1;
    ReadChunkResponseData data = 2;
  }
}

message ReadChunkResponseHeader {
  Chunk chunk = 1;
  Volume volume = 2;
  int64 total_data_length = 3;
}

message ReadChunkResponseData {
  bytes data = 1 [(buf.validate.field).required = true];
  Volume volume = 2;
}
