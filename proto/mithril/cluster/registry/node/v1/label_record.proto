syntax = "proto3";

package mithril.cluster.registry.node.v1;

import "mithril/cluster/registry/node/v1/label.proto";

option go_package = "github.com/amari/mithril/gen/go/proto/mithril/cluster/registry/node/v1;registrynodev1";

message LabelRecord {
  uint32 node_id = 1;
  repeated Label labels = 2;
}
