syntax = "proto3";

package mithril.cluster.registry.node.v1;

option go_package = "github.com/amari/mithril/gen/go/proto/mithril/cluster/registry/node/v1;registrynodev1";

message TaintRecord {
  uint32 node_id = 1;
  repeated Taint taints = 2;

  message Taint {
    string key = 1;
    string value = 2;
    Effect effect = 3;

    enum Effect {
      EFFECT_UNSPECIFIED = 0;
      EFFECT_NO_SCHEDULE = 1;
      EFFECT_PREFER_NO_SCHEDULE = 2;
      EFFECT_NO_EXECUTE = 3;
    }
  }
}
